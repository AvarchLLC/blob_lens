services:
  postgres:
    image: postgres:16-alpine3.20
    container_name: blob-lens-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: blob_lens
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blob_lens"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - blob-lens-network
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    tmpfs:
      - /run
      - /tmp

  blob-lens:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        RUST_BACKTRACE: 1
    container_name: blob-lens-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ALCHEMY_KEY: ${ALCHEMY_KEY}
      DATABASE_URL: ${DATABASE_URL}
      RUST_LOG: ${RUST_LOG:-info}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "0.0.0.0:8080:8080"
    networks:
      - blob-lens-network
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 256M

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: blob-lens-frontend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/blob_lens
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_MARKET_REFRESH_MS: "12000"
      NEXT_PUBLIC_LEADERBOARD_REFRESH_MS: "30000"
    ports:
      - "3000:3000"
    networks:
      - blob-lens-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  blob-lens-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
