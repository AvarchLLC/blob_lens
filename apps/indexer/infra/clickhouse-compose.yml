# ClickHouse Docker deployment for ba-data.
# Run as root (or a user in the docker group):
#   docker compose -f clickhouse-compose.yml up -d
#
# Data is persisted to /clickhouse on the host.
# Do NOT use /workspace — that partition holds EIPsInsight and UI code.
# The HTTP interface (8123) is bound to 0.0.0.0 — Tailscale mesh restricts access.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.3-alpine
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "0.0.0.0:8123:8123"   # HTTP interface — used by the Rust clickhouse crate
      # Native TCP port 9000 intentionally not exposed (port already in use on host)
    volumes:
      - /clickhouse:/var/lib/clickhouse
    environment:
      # Default credentials — change CLICKHOUSE_PASSWORD before first start
      CLICKHOUSE_USER:     blob_lens
      CLICKHOUSE_PASSWORD: changeme
      CLICKHOUSE_DB:       blob_lens
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
