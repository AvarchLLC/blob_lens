# ClickHouse Docker deployment for ba-data.
# Run as root (or a user in the docker group):
#   docker compose -f clickhouse-compose.yml up -d
#
# Data is persisted to /ethereum/data/clickhouse on the host.
# The HTTP interface (8123) and native protocol (9000) are bound to
# localhost only — Tailscale mesh keeps them accessible from your dev machine
# via the ba-data hostname.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.3-alpine
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"   # HTTP interface
      - "127.0.0.1:9000:9000"   # Native protocol (binary, used by Rust client)
    volumes:
      - /ethereum/data/clickhouse:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    environment:
      # Default credentials — change CLICKHOUSE_PASSWORD before first start
      CLICKHOUSE_USER:     blob_lens
      CLICKHOUSE_PASSWORD: changeme
      CLICKHOUSE_DB:       blob_lens
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
