name: Deploy BlobLens to Production Server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_web:
        description: "Force rebuild web (Next.js)"
        type: boolean
        default: false
      force_api:
        description: "Force rebuild API (Rust)"
        type: boolean
        default: false

concurrency:
  group: blob-lens-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Notify Deployment Start
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ env.DISCORD_WEBHOOK }}
          embed-title: "Deploy Started (BlobLens)"
          embed-description: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Deployment has started.
          embed-color: 16776960
          embed-footer-text: "GitHub Actions Deployment Bot"
          embed-timestamp: ${{ github.event.head_commit.timestamp }}

      - name: Detect Changed Paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
            api:
              - 'apps/api/**'
            infra:
              - 'ops/**'
              - '.github/workflows/deploy-production.yml'
              - 'docs/PRODUCTION_DEPLOYMENT.md'
              - '.env.example'

      - name: Deploy to Server
        if: ${{ steps.changes.outputs.web == 'true' || steps.changes.outputs.api == 'true' || steps.changes.outputs.infra == 'true' || inputs.force_web == true || inputs.force_api == true }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
          WEB_CHANGED: ${{ steps.changes.outputs.web == 'true' || inputs.force_web == true }}
          API_CHANGED: ${{ steps.changes.outputs.api == 'true' || inputs.force_api == true }}
          INFRA_CHANGED: ${{ steps.changes.outputs.infra }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: 22
          timeout: 60m
          command_timeout: 55m
          envs: DEPLOY_REPO_URL,WEB_CHANGED,API_CHANGED,INFRA_CHANGED
          script: |
            set -Eeuo pipefail

            BASE_DIR=/opt/blob-lens
            RELEASES_DIR=$BASE_DIR/releases
            SHARED_DIR=$BASE_DIR/shared
            CURRENT_DIR=$BASE_DIR/current
            RELEASE_NAME=$(date +"%Y%m%d_%H%M%S")
            NEW_RELEASE=$RELEASES_DIR/$RELEASE_NAME
            BRANCH=main
            REPO_URL="${DEPLOY_REPO_URL:-https://github.com/${{ github.repository }}.git}"
            BUILD_WEB="${WEB_CHANGED:-false}"
            BUILD_API="${API_CHANGED:-false}"
            INFRA="${INFRA_CHANGED:-false}"

            if [ "$INFRA" = "true" ]; then
              BUILD_WEB=true
              BUILD_API=true
            fi

            echo "Preparing directories"
            mkdir -p "$RELEASES_DIR" "$SHARED_DIR/env" "$SHARED_DIR/logs"

            if [ ! -f "$SHARED_DIR/env/api.env" ]; then
              echo "Missing $SHARED_DIR/env/api.env"
              exit 1
            fi

            if [ ! -f "$SHARED_DIR/env/web.env" ]; then
              echo "Missing $SHARED_DIR/env/web.env"
              exit 1
            fi

            echo "Creating release: $RELEASE_NAME"
            git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$NEW_RELEASE"

            ln -sfn "$SHARED_DIR/env/api.env" "$NEW_RELEASE/apps/api/.env"
            ln -sfn "$SHARED_DIR/env/web.env" "$NEW_RELEASE/apps/web/.env.local"

            NEEDS_NODE=false
            if [ "$BUILD_WEB" = "true" ]; then
              NEEDS_NODE=true
            fi
            if ! command -v pm2 >/dev/null 2>&1; then
              NEEDS_NODE=true
            fi

            if [ "$NEEDS_NODE" = "true" ]; then
              if [ -s "$HOME/.nvm/nvm.sh" ]; then
                . "$HOME/.nvm/nvm.sh"
              else
                echo "Installing nvm"
                curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
                . "$HOME/.nvm/nvm.sh"
              fi

              nvm install 20
              nvm use 20

              if [ "$BUILD_WEB" = "true" ]; then
                corepack enable
                corepack prepare pnpm@9.15.0 --activate
                pnpm --version
              fi

              if ! command -v pm2 >/dev/null 2>&1; then
                npm install -g pm2
              fi
            else
              echo "Skipping Node setup (no web build and PM2 already present)"
            fi

            cd "$NEW_RELEASE"

            if [ "$BUILD_WEB" = "true" ]; then
              echo "Installing workspace dependencies for web build"
              if [ -f "pnpm-lock.yaml" ]; then
                pnpm install --frozen-lockfile
              else
                echo "pnpm-lock.yaml not found; falling back to non-frozen install"
                pnpm install --no-frozen-lockfile
              fi

              echo "Building Next.js web app"
              pnpm --filter web build
            else
              echo "Skipping web build (no web changes detected)"
            fi

            if [ "$BUILD_API" = "true" ]; then
              if [ ! -x "$HOME/.cargo/bin/rustc" ]; then
                echo "Installing Rust toolchain"
                curl https://sh.rustup.rs -sSf | sh -s -- -y
              fi

              . "$HOME/.cargo/env"
              rustup default stable
              rustc --version
              cargo --version

              echo "Building Rust indexer/api"
              cd "$NEW_RELEASE/apps/api"
              cargo build --release
              cd "$NEW_RELEASE"
            else
              echo "Skipping API build (no api changes detected)"
              # The built binary lives inside target/ which is gitignored.
              # Carry the existing binary forward so PM2 has something to run.
              if [ -L "$CURRENT_DIR" ]; then
                OLD_BIN="$(readlink -f "$CURRENT_DIR")/apps/api/target/release/blob_lens"
                NEW_BIN="$NEW_RELEASE/apps/api/target/release/blob_lens"
                if [ -f "$OLD_BIN" ]; then
                  mkdir -p "$(dirname "$NEW_BIN")"
                  cp "$OLD_BIN" "$NEW_BIN"
                  echo "Carried forward existing indexer binary"
                else
                  echo "WARNING: No existing binary found at $OLD_BIN — indexer may not start"
                fi
              fi
            fi

            echo "Switching current symlink"
            ln -sfn "$NEW_RELEASE" "$CURRENT_DIR"

            echo "Reloading PM2 processes"
            if [ "$BUILD_WEB" = "true" ] && [ "$BUILD_API" = "true" ]; then
              pm2 startOrReload "$CURRENT_DIR/ops/pm2/ecosystem.config.cjs" --env production --update-env
            elif [ "$BUILD_WEB" = "true" ]; then
              pm2 startOrReload "$CURRENT_DIR/ops/pm2/ecosystem.config.cjs" --only blob-lens-web --env production --update-env
            elif [ "$BUILD_API" = "true" ]; then
              pm2 startOrReload "$CURRENT_DIR/ops/pm2/ecosystem.config.cjs" --only blob-lens-indexer --env production --update-env
            fi
            pm2 save

            echo "Running health checks"
            sleep 30

            wait_for_http() {
              local url="$1"
              local label="$2"
              for i in 1 2 3; do
                if curl -fsS "$url" >/dev/null 2>&1; then
                  echo "$label OK"
                  return 0
                fi
                echo "$label not ready (attempt $i/3) — waiting 10s"
                sleep 10
              done
              echo "$label FAILED after 3 attempts"
              return 1
            }

            FAIL=0
            if [ "$BUILD_WEB" = "true" ] && ! wait_for_http http://127.0.0.1:3000/api/health "Web"; then
              FAIL=1
            fi
            if [ "$BUILD_API" = "true" ] && ! wait_for_http http://127.0.0.1:8080/health "API"; then
              pm2 logs blob-lens-indexer --lines 30 --nostream 2>&1 || true
              FAIL=1
            fi
            if [ "$FAIL" -eq 1 ]; then
              echo "Health check failed. Rolling back."
              PREVIOUS_RELEASE=$(ls -dt "$RELEASES_DIR"/* | sed -n '2p')
              if [ -n "${PREVIOUS_RELEASE:-}" ]; then
                ln -sfn "$PREVIOUS_RELEASE" "$CURRENT_DIR"
                # Older releases may predate ops/pm2/ecosystem.config.cjs;
                # fall back to restarting existing PM2 processes by name.
                if [ -f "$PREVIOUS_RELEASE/ops/pm2/ecosystem.config.cjs" ]; then
                  pm2 startOrReload "$PREVIOUS_RELEASE/ops/pm2/ecosystem.config.cjs" --env production --update-env || true
                else
                  pm2 restart blob-lens-web blob-lens-indexer || true
                fi
                pm2 save || true
              fi
              exit 1
            fi

            echo "Cleaning old releases (keep last 5)"
            cd "$RELEASES_DIR"
            ls -dt */ | tail -n +6 | xargs -r rm -rf

            echo "Deployment completed successfully"

      - name: Skip Deploy (No Relevant Changes)
        if: ${{ steps.changes.outputs.web != 'true' && steps.changes.outputs.api != 'true' && steps.changes.outputs.infra != 'true' }}
        run: echo "No web/api/infra changes detected. Skipping deployment."

      - name: Discord Notification - Success
        if: ${{ success() && env.DISCORD_WEBHOOK != '' }}
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ env.DISCORD_WEBHOOK }}
          embed-title: "Deploy Successful (BlobLens)"
          embed-description: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            Production updated successfully.
          embed-color: 3066993
          embed-footer-text: "GitHub Actions Deployment Bot"
          embed-timestamp: ${{ github.event.head_commit.timestamp }}

      - name: Discord Notification - Failure
        if: ${{ failure() && env.DISCORD_WEBHOOK != '' }}
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ env.DISCORD_WEBHOOK }}
          embed-title: "Deploy Failed (BlobLens)"
          embed-description: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            Deployment failed. Check action logs.
          embed-color: 15158332
          embed-footer-text: "GitHub Actions Deployment Bot"
          embed-timestamp: ${{ github.event.head_commit.timestamp }}
